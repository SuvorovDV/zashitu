server {
    listen 80;
    server_name _;
    client_max_body_size 25m;

    # SPA: всё что не файл — на index.html.
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml text/xml application/font-woff2 image/svg+xml;
    gzip_min_length 1024;

    # Долгий кэш для иммутабельных бандлов (Vite кладёт hash в имя).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API проксируем на бэк. Пути совпадают с теми, что у фронта в axios baseURL='/'.
    location ~ ^/(auth|orders|payments|generation|files|health|dev)(/|$) {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
